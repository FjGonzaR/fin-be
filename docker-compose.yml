version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: finanzas-postgres
    environment:
      POSTGRES_USER: finanzas
      POSTGRES_PASSWORD: finanzas123
      POSTGRES_DB: finanzas_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finanzas"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
