openapi: 3.0.3
info:
  title: Finanzas Backend API
  description: Personal finance ETL + API
  version: 0.3.0

servers:
  - url: http://localhost:8000
    description: Local development

tags:
  - name: auth
    description: Authentication and registration
  - name: admin
    description: Admin-only user and account management
  - name: accounts
    description: Bank accounts
  - name: files
    description: Source file upload
  - name: etl
    description: ETL processing pipeline
  - name: transactions
    description: Parsed transactions
  - name: categories
    description: Transaction category catalogue
  - name: dashboard
    description: Aggregated analytics (KPIs, histogram, category breakdown, top transactions)

paths:

  # ──────────────────────────────────────────────
  # CATEGORIES
  # ──────────────────────────────────────────────

  /categories:
    get:
      tags: [categories]
      summary: List transaction categories
      operationId: listCategories
      security:
        - BearerAuth: []
      parameters:
        - name: spending_only
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: When true, excludes INGRESO and INVERSION from the list
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'

  # ──────────────────────────────────────────────
  # AUTH
  # ──────────────────────────────────────────────

  /auth/login:
    post:
      tags: [auth]
      security: []
      summary: Login
      description: |
        Authenticate with username and password (form data).
        Returns a Bearer JWT token valid for 8 hours.
      operationId: login
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  /auth/register:
    post:
      tags: [auth]
      security: []
      summary: Register with invite token
      description: |
        Create a new user account using a valid one-time invite token generated
        by an admin. The token is invalidated after use.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created and logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Invalid, used, or expired invite token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '409':
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  # ──────────────────────────────────────────────
  # ADMIN
  # ──────────────────────────────────────────────

  /admin/invite:
    post:
      tags: [admin]
      summary: Create an invite token
      description: |
        Generates a one-time invite token valid for 7 days.
        Share it with the person you want to invite — they use it at `POST /auth/register`.
      operationId: createInvite
      security:
        - BearerAuth: []
      responses:
        '201':
          description: Invite token created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteResponse'
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  /admin/users:
    get:
      tags: [admin]
      summary: List all users
      operationId: listUsers
      security:
        - BearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSummary'
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  /admin/categories:
    get:
      tags: [admin]
      summary: List all categories (including inactive)
      operationId: adminListCategories
      security:
        - BearerAuth: []
      parameters:
        - name: include_inactive
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
    post:
      tags: [admin]
      summary: Create a new category
      operationId: adminCreateCategory
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '409':
          description: Slug already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  /admin/categories/{category_id}:
    patch:
      tags: [admin]
      summary: Update a category
      description: |
        Updates name, slug, description, or is_active. System categories
        (is_system=true) cannot have their slug changed or be deactivated.
      operationId: adminUpdateCategory
      security:
        - BearerAuth: []
      parameters:
        - name: category_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '409':
          description: Slug conflict or operation forbidden on system category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
    delete:
      tags: [admin]
      summary: Delete a category
      description: |
        Hard-deletes a category. System categories cannot be deleted. If the
        category has transactions, pass `reassign_to=<other_category_id>` to
        reassign them; otherwise the request is rejected with 409.
      operationId: adminDeleteCategory
      security:
        - BearerAuth: []
      parameters:
        - name: category_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: reassign_to
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '409':
          description: System category or in use without reassign_to
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  /admin/categories/{category_id}/keywords:
    get:
      tags: [admin]
      summary: List keywords for a category
      operationId: adminListCategoryKeywords
      security:
        - BearerAuth: []
      parameters:
        - name: category_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryKeyword'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
    post:
      tags: [admin]
      summary: Add a manual keyword to a category
      operationId: adminAddCategoryKeyword
      security:
        - BearerAuth: []
      parameters:
        - name: category_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryKeywordCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryKeyword'
        '409':
          description: Keyword already exists for this category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  /admin/categories/{category_id}/keywords/{keyword_id}:
    delete:
      tags: [admin]
      summary: Delete a keyword from a category
      operationId: adminDeleteCategoryKeyword
      security:
        - BearerAuth: []
      parameters:
        - name: category_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: keyword_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '404':
          description: Keyword not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  /admin/users/{user_id}/promote:
    patch:
      tags: [admin]
      summary: Promote user to admin
      operationId: promoteUser
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User promoted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  # ──────────────────────────────────────────────
  # ACCOUNTS
  # ──────────────────────────────────────────────

  /accounts/{account_id}:
    get:
      tags: [accounts]
      summary: Get account by ID
      operationId: getAccount
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

    put:
      tags: [accounts]
      summary: Update an account
      operationId: updateAccount
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUpdate'
      responses:
        '200':
          description: Updated account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

    delete:
      tags: [accounts]
      summary: Delete an account
      description: |
        Deletes the account and cascade-deletes all associated source files,
        transactions, and raw rows.
      operationId: deleteAccount
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountId'
      responses:
        '204':
          description: Deleted
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  /accounts:
    get:
      tags: [accounts]
      summary: List accounts for the current user
      description: |
        Returns only the accounts owned by the authenticated user.
        Admin users see all accounts.
      operationId: listAccounts
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OwnerFilter'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountResponse'

    post:
      tags: [accounts]
      summary: Create a new account
      description: |
        Creates an account owned by the authenticated user.
        The `owner` field is a free-form label (e.g. "PACHO", "LU", or any string).
      operationId: createAccount
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreate'
            example:
              bank_name: BANCOLOMBIA
              account_name: Cuenta de Ahorros
              owner: PACHO
              account_type: AHORROS
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'

  # ──────────────────────────────────────────────
  # FILES
  # ──────────────────────────────────────────────

  /files:
    get:
      tags: [files]
      summary: List uploaded files for the current user
      operationId: listFiles
      security:
        - BearerAuth: []
      parameters:
        - name: order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Sort order by uploaded_at (default newest first)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FileMetadata'

  /files/{file_id}/preview:
    get:
      tags: [files]
      summary: Preview raw rows of a processed file
      operationId: previewFile
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/FileId'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of rows to return
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilePreviewResponse'
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  /files/{file_id}/url:
    get:
      tags: [files]
      summary: Get a signed URL for direct file access
      description: |
        Returns a short-lived Supabase Storage signed URL so the client can
        open or download the file directly without proxying through the backend.
        Only available when Supabase Storage is configured (returns 501 otherwise).
      operationId: getFileUrl
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/FileId'
        - name: expires_in
          in: query
          required: false
          schema:
            type: integer
            minimum: 60
            maximum: 86400
            default: 3600
          description: URL validity in seconds (default 1 hour, max 24 hours)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  file_id:
                    type: string
                    format: uuid
                  url:
                    type: string
                    format: uri
                    description: Signed URL valid for `expires_in` seconds
                  expires_in:
                    type: integer
                    description: Validity duration in seconds
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '501':
          description: Supabase Storage not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  /files/{file_id}:
    delete:
      tags: [files]
      summary: Delete a source file
      description: |
        Deletes the file from Supabase Storage and removes the database record.
        Returns 409 if the file has associated transactions — run
        `DELETE /etl/reset/{file_id}` first to remove them.
      operationId: deleteFile
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/FileId'
      responses:
        '204':
          description: Deleted
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '409':
          description: File has associated transactions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  /files/upload:
    post:
      tags: [files]
      summary: Upload a bank statement file
      description: |
        Accepts `.xlsx` or `.pdf` files for any supported bank.
        Returns the existing record if the file hash already exists.
        If `file_password` is provided, the PDF is unlocked in memory before
        being stored — the password itself is never persisted.
        The `account_id` must belong to the authenticated user.
      operationId: uploadFile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, account_id]
              properties:
                file:
                  type: string
                  format: binary
                  description: Bank statement file (.xlsx or .pdf)
                account_id:
                  type: string
                  format: uuid
                  description: Account this file belongs to
                file_password:
                  type: string
                  description: |
                    Optional password for password-protected files (e.g. Nequi PDF uses the account holder's cédula).
                    Used to unlock the PDF before storage — never persisted.
      responses:
        '200':
          description: OK (file already existed or newly created)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadResponse'
        '400':
          description: Unsupported file type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  # ──────────────────────────────────────────────
  # ETL
  # ──────────────────────────────────────────────

  /etl/process/{file_id}:
    post:
      tags: [etl]
      summary: Run ETL pipeline for a source file
      description: |
        Parses, normalizes, categorizes, and persists transactions for the given
        source file. The bank/parser is resolved automatically from the account
        associated with the file.
        Returns immediately if the file was already processed.
      operationId: processEtl
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/FileId'
      responses:
        '200':
          description: ETL result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ETLProcessResponse'
        '404':
          description: Source file not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '500':
          description: ETL processing failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  /etl/reset/{file_id}:
    delete:
      tags: [etl]
      summary: Reset ETL for a source file
      description: |
        Deletes all transactions and raw rows associated with the file and
        resets its `parse_status` back to `UPLOADED`.
      operationId: resetEtl
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/FileId'
      responses:
        '200':
          description: Reset result
          content:
            application/json:
              schema:
                type: object
                properties:
                  file_id:
                    type: string
                    format: uuid
                  deleted_transactions:
                    type: integer
                  deleted_raw_rows:
                    type: integer
                  status:
                    type: string
                    example: UPLOADED
        '404':
          description: Source file not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  # ──────────────────────────────────────────────
  # TRANSACTIONS
  # ──────────────────────────────────────────────

  /transactions:
    get:
      tags: [transactions]
      summary: List transactions for the current user
      operationId: listTransactions
      security:
        - BearerAuth: []
      parameters:
        - name: account_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter by account UUID
        - $ref: '#/components/parameters/OwnerFilter'
        - $ref: '#/components/parameters/DateFromFilter'
        - $ref: '#/components/parameters/DateToFilter'
        - $ref: '#/components/parameters/CategoryFilter'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TransactionResponse'

  /transactions/{transaction_id}/categorize:
    patch:
      tags: [transactions]
      summary: Manually recategorize a transaction
      description: |
        Sets the category on the transaction with `category_method=USER` and
        confidence 1.00. Always upserts the (description_clean, category) pair
        into `category_examples` so the classifier picks it up as a user override
        on future runs, and triggers the keyword learner — recurring tokens may
        be promoted to LEARNED keywords on `category_keywords`.
      operationId: recategorizeTransaction
      security:
        - BearerAuth: []
      parameters:
        - name: transaction_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecategorizeRequest'
            example:
              category_slug: OCIO
              description_clean: NETFLIX DL
      responses:
        '200':
          description: Updated transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '404':
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  # ──────────────────────────────────────────────
  # DASHBOARD
  # ──────────────────────────────────────────────

  /dashboard/kpis:
    get:
      tags: [dashboard]
      summary: KPI summary
      description: |
        Returns aggregate KPIs for the filtered set of transactions.
        All amounts are in COP (USD transactions converted at 4000 COP/USD).
        Results are scoped to the current user's accounts (admin sees all).

        Buckets are determined by transaction category:
        - `total_ingresos` — transactions categorized as `INGRESO` (money received into savings)
        - `total_gastos` — negative-amount transactions excluding `PAGO`, `INVERSION`, `INGRESO`, `MOVIMIENTO_ENTRE_BANCOS`
        - `total_pagos` — transactions categorized as `PAGO` (credit card payments from savings)
        - `total_inversiones` — transactions categorized as `INVERSION` (fund contributions)
        - `net` — `total_ingresos - total_gastos - total_inversiones` (`total_pagos` excluded to avoid double-counting CC expenses)
        - `avg_daily_spend` — `total_gastos` averaged over the number of distinct days in the result set
      operationId: getDashboardKpis
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OwnerFilter'
        - $ref: '#/components/parameters/AccountIdFilter'
        - $ref: '#/components/parameters/DateFromFilter'
        - $ref: '#/components/parameters/DateToFilter'
        - $ref: '#/components/parameters/CategoryFilter'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KPIResponse'

  /dashboard/histogram:
    get:
      tags: [dashboard]
      summary: Weekly expense histogram
      description: |
        Returns one data point per ISO week with aggregated `total_spent` in COP.
        Sorted ascending by week. PAGO transactions are always excluded.
        Results are scoped to the current user's accounts (admin sees all).
      operationId: getDashboardHistogram
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OwnerFilter'
        - $ref: '#/components/parameters/AccountIdFilter'
        - $ref: '#/components/parameters/DateFromFilter'
        - $ref: '#/components/parameters/DateToFilter'
        - $ref: '#/components/parameters/CategoryFilter'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistogramPoint'

  /dashboard/by-category:
    get:
      tags: [dashboard]
      summary: Net spend breakdown by category
      description: |
        Groups expense transactions (amount < 0) by category and returns the absolute total per category.
        Categories `PAGO`, `INGRESO` and `INVERSION` are excluded (use `/kpis` for those).
        Only negative-amount transactions are included, so income entries that happen to share
        a category label do not distort the breakdown.
        Transactions without a category appear as `"SIN_CATEGORIZAR"`.
        Sorted by total descending. Results scoped to the current user (admin sees all).
      operationId: getDashboardByCategory
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OwnerFilter'
        - $ref: '#/components/parameters/AccountIdFilter'
        - $ref: '#/components/parameters/DateFromFilter'
        - $ref: '#/components/parameters/DateToFilter'
        - $ref: '#/components/parameters/CategoryFilter'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryBreakdownItem'

  /dashboard/top-transactions:
    get:
      tags: [dashboard]
      summary: Top N largest expenses
      description: |
        Returns the largest expenses (`amount < 0`) ordered by amount ascending
        (most negative first). All amounts are returned as positive values in COP.
        Results are scoped to the current user's accounts (admin sees all).
      operationId: getDashboardTopTransactions
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OwnerFilter'
        - $ref: '#/components/parameters/AccountIdFilter'
        - $ref: '#/components/parameters/DateFromFilter'
        - $ref: '#/components/parameters/DateToFilter'
        - $ref: '#/components/parameters/CategoryFilter'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
          description: Number of transactions to return
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TopTransactionItem'

# ──────────────────────────────────────────────
# COMPONENTS
# ──────────────────────────────────────────────

security:
  - BearerAuth: []

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    FileId:
      name: file_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Source file UUID

    AccountId:
      name: account_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Account UUID

    OwnerFilter:
      name: owner
      in: query
      required: false
      schema:
        type: string
      description: Filter by owner label (e.g. "PACHO", "LU")

    AccountIdFilter:
      name: account_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: Filter by account UUID

    DateFromFilter:
      name: date_from
      in: query
      required: false
      schema:
        type: string
        format: date
        example: "2026-01-01"
      description: Start date (inclusive) in `YYYY-MM-DD` format

    DateToFilter:
      name: date_to
      in: query
      required: false
      schema:
        type: string
        format: date
        example: "2026-03-31"
      description: End date (inclusive) in `YYYY-MM-DD` format

    CategoryFilter:
      name: category
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/CategorySlug'
      description: Filter by transaction category slug (e.g. "RESTAURANTES")

  schemas:

    # ── Enums ──────────────────────────────────

    BankEnum:
      type: string
      enum: [BANCOLOMBIA, RAPPI, FALABELLA, NEQUI]

    AccountTypeEnum:
      type: string
      enum: [CREDITO, DEBITO, AHORROS]

    Category:
      type: object
      description: |
        Admin-managed category. Categories with `is_system=true` have hardcoded
        behavior in the dashboard (e.g. PAGO, INGRESO, INVERSION, MOVIMIENTO_ENTRE_BANCOS, OTROS)
        and cannot be renamed or deleted.
      required: [id, slug, name, is_active, is_system]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
          description: Stable identifier used by code and filters (uppercase snake_case)
          example: RESTAURANTES
        name:
          type: string
          example: Restaurantes
        description:
          type: string
          nullable: true
        is_active:
          type: boolean
        is_system:
          type: boolean

    CategorySlug:
      type: string
      description: Slug of a category (matches `Category.slug`). Free-form to support admin-defined categories.
      example: RESTAURANTES

    CategoryCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
        slug:
          type: string
          description: Optional. If omitted, derived from `name`.
        description:
          type: string
          nullable: true

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        is_active:
          type: boolean

    KeywordOrigin:
      type: string
      enum: [MANUAL, LEARNED]
      description: |
        - `MANUAL`: keyword was added by an admin (or seeded from the original RULES dict).
        - `LEARNED`: keyword was promoted automatically by the keyword learner after recurring user reclassifications.

    CategoryKeyword:
      type: object
      required: [id, category_id, keyword, origin, weight, is_active, created_at]
      properties:
        id:
          type: string
          format: uuid
        category_id:
          type: string
          format: uuid
        keyword:
          type: string
        origin:
          $ref: '#/components/schemas/KeywordOrigin'
        weight:
          type: integer
          description: For LEARNED keywords, the count of reclassifications that promoted it.
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    CategoryKeywordCreate:
      type: object
      required: [keyword]
      properties:
        keyword:
          type: string

    CategoryMethod:
      type: string
      enum: [RULES, LLM, USER]

    ParseStatus:
      type: string
      enum: [UPLOADED, PROCESSED, FAILED]

    # ── Auth ───────────────────────────────────

    RegisterRequest:
      type: object
      required: [username, password, invite_token]
      properties:
        username:
          type: string
          example: lupa
        password:
          type: string
          format: password
        invite_token:
          type: string
          format: uuid
          description: One-time invite token generated by an admin

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: bearer
        is_admin:
          type: boolean
          description: Whether the authenticated user has admin privileges

    # ── Admin ──────────────────────────────────

    InviteResponse:
      type: object
      properties:
        invite_token:
          type: string
          format: uuid
          description: One-time token to share with the invitee
        expires_at:
          type: string
          format: date-time
          description: Token expiry (7 days from creation)

    UserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        is_admin:
          type: boolean
        created_at:
          type: string
          format: date-time

    # ── Accounts ───────────────────────────────

    AccountUpdate:
      type: object
      properties:
        bank_name:
          $ref: '#/components/schemas/BankEnum'
        account_name:
          type: string
        owner:
          type: string
          description: Free-form owner label (e.g. "PACHO", "LU")
        account_type:
          $ref: '#/components/schemas/AccountTypeEnum'

    AccountCreate:
      type: object
      required: [bank_name, account_name, owner, account_type]
      properties:
        bank_name:
          $ref: '#/components/schemas/BankEnum'
        account_name:
          type: string
          example: Cuenta de Ahorros
        owner:
          type: string
          description: Free-form owner label (e.g. "PACHO", "LU")
          example: PACHO
        account_type:
          $ref: '#/components/schemas/AccountTypeEnum'

    AccountResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        bank_name:
          $ref: '#/components/schemas/BankEnum'
        account_name:
          type: string
        owner:
          type: string
          description: Free-form owner label
        account_type:
          $ref: '#/components/schemas/AccountTypeEnum'
        user_id:
          type: string
          format: uuid
          nullable: true
          description: UUID of the user who owns this account

    # ── Files ──────────────────────────────────

    FileMetadata:
      type: object
      properties:
        file_id:
          type: string
          format: uuid
        filename:
          type: string
        account_id:
          type: string
          format: uuid
        account_name:
          type: string
        status:
          type: string
          enum: [UPLOADED, PARSING, SUCCESS, FAILED]
          description: Current processing status of the file
        uploaded_at:
          type: string
          format: date-time
        hash:
          type: string
          description: SHA-256 hash of the file

    FilePreviewResponse:
      type: object
      properties:
        file_id:
          type: string
          format: uuid
        filename:
          type: string
        columns:
          type: array
          items:
            type: string
          description: Column names derived from the raw parsed data
        rows:
          type: array
          items:
            type: object
          description: First N raw rows as parsed from the source file
        total_rows:
          type: integer
          description: Total number of raw rows stored for this file

    FileUploadResponse:
      type: object
      properties:
        file_id:
          type: string
          format: uuid
        parse_status:
          $ref: '#/components/schemas/ParseStatus'
        file_hash:
          type: string
          description: SHA-256 hash of the file (used for deduplication)
        original_filename:
          type: string
        uploaded_at:
          type: string
          format: date-time

    # ── ETL ────────────────────────────────────

    ETLProcessResponse:
      type: object
      properties:
        parsed_rows:
          type: integer
        inserted_transactions:
          type: integer
        duplicates_skipped:
          type: integer
        status:
          type: string
          enum: [PROCESSED, ALREADY_PROCESSED, FAILED]

    # ── Transactions ───────────────────────────

    TransactionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        source_file_id:
          type: string
          format: uuid
        posted_at:
          type: string
          format: date
        description_raw:
          type: string
        description_clean:
          type: string
        amount:
          type: number
          description: Amount in COP (USD transactions are converted at 4000 COP/USD). Negative = expense, positive = income.
        currency:
          type: string
          example: COP
        merchant_guess:
          type: string
          nullable: true
        details_json:
          type: object
          nullable: true
        category_id:
          type: string
          format: uuid
          nullable: true
          description: FK to `categories.id`. Null when the transaction is uncategorized.
        category:
          type: string
          nullable: true
          description: Slug of the assigned category (mirror of `category_id` for convenience).
        category_confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          nullable: true
        category_method:
          $ref: '#/components/schemas/CategoryMethod'
          nullable: true
        created_at:
          type: string
          format: date-time
        account_id:
          type: string
          format: uuid
        account_name:
          type: string
        bank_name:
          $ref: '#/components/schemas/BankEnum'
        owner:
          type: string
          description: Free-form owner label on the account
        account_type:
          $ref: '#/components/schemas/AccountTypeEnum'

    RecategorizeRequest:
      type: object
      description: |
        Reassign a transaction to a category. Provide either `category_id` or
        `category_slug`. The reclassification always upserts a CategoryExample
        and runs the keyword learner so future classifications benefit from it.
      properties:
        category_id:
          type: string
          format: uuid
          nullable: true
        category_slug:
          $ref: '#/components/schemas/CategorySlug'
        description_clean:
          type: string
          nullable: true
          description: |
            Optional. Defaults to the transaction's existing `description_clean`.
            The (description_clean, category_id) pair is upserted into
            `category_examples` and feeds the keyword learner.

    # ── Dashboard ──────────────────────────────

    KPIResponse:
      type: object
      required:
        - total_ingresos
        - total_gastos
        - total_pagos
        - total_inversiones
        - net
        - transaction_count
      properties:
        total_ingresos:
          type: number
          description: |
            Sum of positive-amount transactions in COP. Includes:
            - INGRESO-category transactions (money received into savings account)
            - Credits/refunds within spending categories (e.g. an OCIO refund)
        total_gastos:
          type: number
          description: Absolute sum of expense transactions in COP, excluding PAGO, INVERSION, INGRESO and MOVIMIENTO_ENTRE_BANCOS
        total_pagos:
          type: number
          description: Absolute sum of PAGO-category transactions in COP (credit card payments from savings)
        total_inversiones:
          type: number
          description: Absolute sum of INVERSION-category transactions in COP (contributions to investment funds)
        net:
          type: number
          description: |
            total_ingresos - total_gastos - total_inversiones.
            Note: total_pagos is excluded from net because credit card payments settle
            debt already counted as gastos in the CC accounts — subtracting them again
            would double-count those expenses.
        transaction_count:
          type: integer
        avg_daily_spend:
          type: number
          nullable: true
          description: total_gastos averaged over distinct days in the result set. Null when no data.

    HistogramPoint:
      type: object
      properties:
        week:
          type: string
          example: "2025-01-13"
          description: Start date (Monday) of the week in YYYY-MM-DD format
        total_spent:
          type: number
          description: Absolute sum of expenses for the week in COP

    CategoryBreakdownItem:
      type: object
      properties:
        category:
          type: string
          nullable: true
          description: Category name or "SIN_CATEGORIZAR" for uncategorized transactions
          example: RESTAURANTES
        total:
          type: number
          description: Total expenses for this category in COP (positive value)
        percentage:
          type: number
          description: Percentage of grand total (0–100)
          example: 23.45
        count:
          type: integer
          description: Number of transactions in this category

    TopTransactionItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        posted_at:
          type: string
          format: date
        description_clean:
          type: string
        amount:
          type: number
          description: Expense amount in COP, always positive (absolute value)
        category:
          type: string
          nullable: true
        merchant_guess:
          type: string
          nullable: true
        account_name:
          type: string
        bank_name:
          $ref: '#/components/schemas/BankEnum'
        owner:
          type: string
          description: Free-form owner label on the account
        account_type:
          $ref: '#/components/schemas/AccountTypeEnum'

    # ── Common ─────────────────────────────────

    ErrorDetail:
      type: object
      properties:
        detail:
          type: string
