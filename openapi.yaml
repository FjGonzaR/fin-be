openapi: 3.0.3
info:
  title: Finanzas Backend API
  description: Personal finance ETL + API
  version: 0.2.0

servers:
  - url: http://localhost:8000
    description: Local development

tags:
  - name: auth
    description: Authentication
  - name: accounts
    description: Bank accounts
  - name: files
    description: Source file upload
  - name: etl
    description: ETL processing pipeline
  - name: transactions
    description: Parsed transactions
  - name: dashboard
    description: Aggregated analytics (KPIs, histogram, category breakdown, top transactions)

paths:

  # ──────────────────────────────────────────────
  # AUTH
  # ──────────────────────────────────────────────

  /auth/login:
    post:
      tags: [auth]
      security: []
      summary: Login
      description: |
        Authenticate with username and password (form data).
        Returns a Bearer JWT token valid for 8 hours.
      operationId: login
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  # ──────────────────────────────────────────────
  # ACCOUNTS
  # ──────────────────────────────────────────────

  /accounts:
    get:
      tags: [accounts]
      summary: List all accounts
      operationId: listAccounts
      parameters:
        - name: owner
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/OwnerEnum'
          description: Filter accounts by owner
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountResponse'

    post:
      tags: [accounts]
      summary: Create a new account
      operationId: createAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreate'
            example:
              bank_name: BANCOLOMBIA
              account_name: Cuenta de Ahorros
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'

  # ──────────────────────────────────────────────
  # FILES
  # ──────────────────────────────────────────────

  /files/upload:
    post:
      tags: [files]
      summary: Upload a bank statement file
      description: |
        Accepts `.xlsx` (Bancolombia) or `.pdf` (Rappi) files.
        Returns the existing record if the file hash already exists.
      operationId: uploadFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, account_id]
              properties:
                file:
                  type: string
                  format: binary
                  description: Bank statement file (.xlsx or .pdf)
                account_id:
                  type: string
                  format: uuid
                  description: Account this file belongs to
      responses:
        '200':
          description: OK (file already existed or newly created)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadResponse'
        '400':
          description: Unsupported file type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  # ──────────────────────────────────────────────
  # ETL
  # ──────────────────────────────────────────────

  /etl/process/{file_id}:
    post:
      tags: [etl]
      summary: Run ETL pipeline for a source file
      description: |
        Parses, normalizes, categorizes, and persists transactions for the given
        source file. The bank/parser is resolved automatically from the account
        associated with the file.
        Returns immediately if the file was already processed.
      operationId: processEtl
      parameters:
        - $ref: '#/components/parameters/FileId'
      responses:
        '200':
          description: ETL result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ETLProcessResponse'
        '404':
          description: Source file not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '500':
          description: ETL processing failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  /etl/reset/{file_id}:
    delete:
      tags: [etl]
      summary: Reset ETL for a source file
      description: |
        Deletes all transactions and raw rows associated with the file and
        resets its `parse_status` back to `UPLOADED`.
      operationId: resetEtl
      parameters:
        - $ref: '#/components/parameters/FileId'
      responses:
        '200':
          description: Reset result
          content:
            application/json:
              schema:
                type: object
                properties:
                  file_id:
                    type: string
                    format: uuid
                  deleted_transactions:
                    type: integer
                  deleted_raw_rows:
                    type: integer
                  status:
                    type: string
                    example: UPLOADED
        '404':
          description: Source file not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  # ──────────────────────────────────────────────
  # TRANSACTIONS
  # ──────────────────────────────────────────────

  /transactions:
    get:
      tags: [transactions]
      summary: List transactions
      operationId: listTransactions
      parameters:
        - name: account_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter by account UUID
        - name: owner
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/OwnerEnum'
          description: Filter by owner
        - name: months
          in: query
          required: false
          schema:
            type: string
            example: "2025-01,2025-02"
          description: |
            Comma-separated list of months in `YYYY-MM` format.
            When provided, only transactions within those months are returned.
        - $ref: '#/components/parameters/CategoryFilter'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TransactionResponse'

  /transactions/{transaction_id}/categorize:
    patch:
      tags: [transactions]
      summary: Manually recategorize a transaction
      description: |
        Sets the category on the transaction with `category_method=USER`.
        Optionally seeds a new `category_example` from `description_clean`
        to improve future automatic categorization.
      operationId: recategorizeTransaction
      parameters:
        - name: transaction_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecategorizeRequest'
            example:
              category: OCIO
              description_clean: NETFLIX DL
      responses:
        '200':
          description: Updated transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '404':
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  # ──────────────────────────────────────────────
  # DASHBOARD
  # ──────────────────────────────────────────────

  /dashboard/kpis:
    get:
      tags: [dashboard]
      summary: KPI summary
      description: |
        Returns aggregate KPIs for the filtered set of transactions.
        All amounts are in COP (USD transactions converted at 4000 COP/USD).
        `amount < 0` → expense; `amount > 0` → income/credit.
      operationId: getDashboardKpis
      parameters:
        - $ref: '#/components/parameters/OwnerFilter'
        - $ref: '#/components/parameters/AccountIdFilter'
        - $ref: '#/components/parameters/MonthsFilter'
        - $ref: '#/components/parameters/CategoryFilter'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KPIResponse'

  /dashboard/histogram:
    get:
      tags: [dashboard]
      summary: Weekly expense histogram
      description: |
        Returns one data point per ISO week with aggregated `total_spent` in COP.
        Sorted ascending by week.
      operationId: getDashboardHistogram
      parameters:
        - $ref: '#/components/parameters/OwnerFilter'
        - $ref: '#/components/parameters/AccountIdFilter'
        - $ref: '#/components/parameters/MonthsFilter'
        - $ref: '#/components/parameters/CategoryFilter'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistogramPoint'

  /dashboard/by-category:
    get:
      tags: [dashboard]
      summary: Net spend breakdown by category
      description: |
        Groups all transactions by category and returns the net delta per category:
        expenses minus abonos/credits within the same category.
        The `PAGO` category is excluded from results.
        Transactions without a category appear as `"SIN_CATEGORIZAR"`.
        Sorted by total descending.
      operationId: getDashboardByCategory
      parameters:
        - $ref: '#/components/parameters/OwnerFilter'
        - $ref: '#/components/parameters/AccountIdFilter'
        - $ref: '#/components/parameters/MonthsFilter'
        - $ref: '#/components/parameters/CategoryFilter'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryBreakdownItem'

  /dashboard/top-transactions:
    get:
      tags: [dashboard]
      summary: Top N largest expenses
      description: |
        Returns the largest expenses (`amount < 0`) ordered by amount ascending
        (most negative first). All amounts are returned as positive values in COP.
      operationId: getDashboardTopTransactions
      parameters:
        - $ref: '#/components/parameters/OwnerFilter'
        - $ref: '#/components/parameters/AccountIdFilter'
        - $ref: '#/components/parameters/MonthsFilter'
        - $ref: '#/components/parameters/CategoryFilter'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
          description: Number of transactions to return
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TopTransactionItem'

# ──────────────────────────────────────────────
# COMPONENTS
# ──────────────────────────────────────────────

security:
  - BearerAuth: []

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    FileId:
      name: file_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Source file UUID

    OwnerFilter:
      name: owner
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/OwnerEnum'
      description: Filter by owner

    AccountIdFilter:
      name: account_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: Filter by account UUID

    MonthsFilter:
      name: months
      in: query
      required: false
      schema:
        type: string
        example: "2025-01,2025-02"
      description: Comma-separated months in `YYYY-MM` format

    CategoryFilter:
      name: category
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/Category'
      description: Filter by transaction category

  schemas:

    # ── Enums ──────────────────────────────────

    BankEnum:
      type: string
      enum: [BANCOLOMBIA, RAPPI, FALABELLA]

    OwnerEnum:
      type: string
      enum: [PACHO, LU]

    AccountTypeEnum:
      type: string
      enum: [CREDITO, DEBITO]

    Category:
      type: string
      enum:
        - HOGAR
        - DOMICILIOS
        - CARRO
        - TRANSPORTE
        - OCIO
        - RESTAURANTES
        - ROPA
        - SALUD
        - PRESTACIONES
        - REGALOS
        - EDUCACION
        - TRABAJO
        - COBRO_BANCARIO
        - PAGO
        - PLATAFORMAS
        - OTROS

    CategoryMethod:
      type: string
      enum: [RULES, LLM, USER]

    ParseStatus:
      type: string
      enum: [UPLOADED, PROCESSED, FAILED]

    # ── Accounts ───────────────────────────────

    AccountCreate:
      type: object
      required: [bank_name, account_name, owner, account_type]
      properties:
        bank_name:
          $ref: '#/components/schemas/BankEnum'
        account_name:
          type: string
          example: Cuenta de Ahorros
        owner:
          $ref: '#/components/schemas/OwnerEnum'
        account_type:
          $ref: '#/components/schemas/AccountTypeEnum'

    AccountResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        bank_name:
          $ref: '#/components/schemas/BankEnum'
        account_name:
          type: string
        owner:
          $ref: '#/components/schemas/OwnerEnum'
        account_type:
          $ref: '#/components/schemas/AccountTypeEnum'

    # ── Files ──────────────────────────────────

    FileUploadResponse:
      type: object
      properties:
        file_id:
          type: string
          format: uuid
        parse_status:
          $ref: '#/components/schemas/ParseStatus'
        file_hash:
          type: string
          description: SHA-256 hash of the file (used for deduplication)
        original_filename:
          type: string
        uploaded_at:
          type: string
          format: date-time

    # ── ETL ────────────────────────────────────

    ETLProcessResponse:
      type: object
      properties:
        parsed_rows:
          type: integer
        inserted_transactions:
          type: integer
        duplicates_skipped:
          type: integer
        status:
          type: string
          enum: [PROCESSED, ALREADY_PROCESSED, FAILED]

    # ── Transactions ───────────────────────────

    TransactionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        source_file_id:
          type: string
          format: uuid
        posted_at:
          type: string
          format: date
        description_raw:
          type: string
        description_clean:
          type: string
        amount:
          type: number
          description: Amount in COP (USD transactions are converted at 4000 COP/USD). Negative = expense, positive = income.
        currency:
          type: string
          example: COP
        merchant_guess:
          type: string
          nullable: true
        details_json:
          type: object
          nullable: true
        category:
          $ref: '#/components/schemas/Category'
          nullable: true
        category_confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          nullable: true
        category_method:
          $ref: '#/components/schemas/CategoryMethod'
          nullable: true
        created_at:
          type: string
          format: date-time
        account_id:
          type: string
          format: uuid
        account_name:
          type: string
        bank_name:
          $ref: '#/components/schemas/BankEnum'
        owner:
          $ref: '#/components/schemas/OwnerEnum'
        account_type:
          $ref: '#/components/schemas/AccountTypeEnum'

    RecategorizeRequest:
      type: object
      required: [category]
      properties:
        category:
          $ref: '#/components/schemas/Category'
        description_clean:
          type: string
          nullable: true
          description: |
            If provided, seeds a new category_example entry so future
            transactions with this description are auto-categorized.

    # ── Dashboard ──────────────────────────────

    KPIResponse:
      type: object
      properties:
        total_spent:
          type: number
          description: Absolute sum of expenses in COP
        total_abonos:
          type: number
          description: Suma de abonos/créditos en COP — pagos de deuda, reversos o ingresos
        net:
          type: number
          description: total_abonos - total_spent
        transaction_count:
          type: integer
        expense_count:
          type: integer
        abono_count:
          type: integer
        avg_monthly_spend:
          type: number
          nullable: true
          description: total_spent divided by number of distinct months. Null when no data.

    HistogramPoint:
      type: object
      properties:
        week:
          type: string
          example: "2025-01-13"
          description: Start date (Monday) of the week in YYYY-MM-DD format
        total_spent:
          type: number
          description: Absolute sum of expenses for the week in COP

    CategoryBreakdownItem:
      type: object
      properties:
        category:
          type: string
          nullable: true
          description: Category name or "SIN_CATEGORIZAR" for uncategorized transactions
          example: RESTAURANTES
        total:
          type: number
          description: Total expenses for this category in COP (positive value)
        percentage:
          type: number
          description: Percentage of grand total (0–100)
          example: 23.45
        count:
          type: integer
          description: Number of transactions in this category

    TopTransactionItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        posted_at:
          type: string
          format: date
        description_clean:
          type: string
        amount:
          type: number
          description: Expense amount in COP, always positive (absolute value)
        category:
          type: string
          nullable: true
        merchant_guess:
          type: string
          nullable: true
        account_name:
          type: string
        bank_name:
          $ref: '#/components/schemas/BankEnum'
        owner:
          $ref: '#/components/schemas/OwnerEnum'
        account_type:
          $ref: '#/components/schemas/AccountTypeEnum'

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: bearer

    # ── Common ─────────────────────────────────

    ErrorDetail:
      type: object
      properties:
        detail:
          type: string
